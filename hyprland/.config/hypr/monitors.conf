# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,1
monitor=,preferred,auto,1

# Per-monitor override: LG UltraGear 4K at home.
# Matched by description (serial-unique) so it only affects this physical unit.
#
# TEMPORAL: 4K da rayas negras intermitentes por HDMI (bug del display Intel a 4K).
# Mientras tanto, 1440p@120 sin escalar (limpio). Restaurar la línea 1.25 de abajo
# cuando llegue el hub USB-C → DisplayPort.
monitor=desc:LG Electronics LG ULTRAGEAR+ 401NTQD3N604,2560x1440@120,auto,1
# monitor=desc:LG Electronics LG ULTRAGEAR+ 401NTQD3N604,preferred,auto,1.25

# env = GDK_SCALE,1,75
# monitor=eDP-1,3072x1920@60,auto,1.6
#
# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
