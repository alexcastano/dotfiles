# Capture Submap (Super+Shift+C)
# Screenshot, screen recording, and screen tools

bind = SUPER SHIFT, C, submap, capture

submap = capture
    # e - Screenshot with editing
    bindd = , E, Screenshot (edit), exec, hyprctl dispatch submap reset; omarchy-cmd-screenshot

    # c - Screenshot to clipboard
    bindd = , C, Screenshot (clipboard), exec, hyprctl dispatch submap reset; omarchy-cmd-screenshot smart clipboard

    # r - Screen recording
    bindd = , R, Screen recording, exec, hyprctl dispatch submap reset; omarchy-menu screenrecord

    # p - Color picker
    bindd = , P, Color picker, exec, hyprctl dispatch submap reset; pkill hyprpicker || hyprpicker -a

    # s - Share
    bindd = , S, Share, exec, hyprctl dispatch submap reset; omarchy-menu share

    # Exit submap
    bind = , catchall, submap, reset
    bind = , ESCAPE, submap, reset
    bind = , RETURN, submap, reset
submap = reset
